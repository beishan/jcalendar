; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
description = Ink Screen Calendar
default_envs = esp32s3

[common]
framework = arduino
lib_deps = 
;	zinggjm/GxEPD2@^1.6.0
	olikraus/U8g2_for_Adafruit_GFX@^1.8.0
	bblanchon/ArduinoJson@^7.2.0
	tzapu/WiFiManager@^2.0.17
	mathertel/OneButton@^2.6.1
	https://github.com/JADE-Jerry/nongli.git
	https://github.com/tignioj/ArduinoUZlib
	https://github.com/Wh1teRabbitHU/RX8010SJ

[env:1680]
build_type = release
platform = espressif32
board = esp32dev
framework = ${common.framework}
lib_deps = ${common.lib_deps}
upload_speed = 921600
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
build_flags = -D SI_DRIVER=1680 -DLOLIN32_LITE

[env:z98]
build_type = release
platform = espressif32
board = esp32dev
framework = ${common.framework}
lib_deps = ${common.lib_deps}
upload_speed = 460800
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
build_flags = -D SI_DRIVER=98 -DLOLIN32_LITE

[env:z21]
build_type = release
platform = espressif32
board = esp32dev
framework = ${common.framework}
lib_deps = ${common.lib_deps}
upload_speed = 460800
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
build_flags = -D SI_DRIVER=21 -DLOLIN32_LITE

[env:z15]
build_type = release
platform = espressif32
board = esp32dev
framework = ${common.framework}
lib_deps = ${common.lib_deps}
upload_speed = 460800
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
build_flags = -D SI_DRIVER=15 -DLOLIN32_LITE

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = ${common.framework}
lib_deps = ${common.lib_deps}
upload_speed = 921600
monitor_speed = 115200
board_build.partitions = default_16MB.csv
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
build_flags =
	-D SI_DRIVER=98
	-DESP32S3_N16R8
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
board_build.flash_mode = dio
framework = ${common.framework}
lib_deps = ${common.lib_deps}
upload_speed = 460800
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
build_flags = -D SI_DRIVER=98
;	-DARDUINO_USB_MODE=1
;	-DARDUINO_USB_CDC_ON_BOOT=1
